<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 custom-card" style="width: 350px;">
        <h4 class="text-center">Reset Password</h4>

        <form onsubmit="return validatePassword()">

            <!-- New Password -->
            <div class="input-group my-2">
                <input type="password" id="password" class="form-control" placeholder="New Password" required>
                <span class="input-group-text" onclick="togglePassword('password','eye1')">
                    <i class="bi bi-eye" id="eye1"></i>
                </span>
            </div>

            <!-- Confirm Password -->
            <div class="input-group my-2">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
                <span class="input-group-text" onclick="togglePassword('confirmPassword','eye2')">
                    <i class="bi bi-eye" id="eye2"></i>
                </span>
            </div>

            <!-- Error Message -->
            <p id="error" class="text-danger text-center"></p>

            <button class="btn btn-danger w-100 mt-2">Update Password</button>

            <div class="text-center mt-2">
                <a href="index.html">Back to Login</a>
            </div>

        </form>
    </div>
</div>

<!-- SCRIPT -->
<script>

// Toggle password visibility
function togglePassword(inputId, iconId) {
    let input = document.getElementById(inputId);
    let icon = document.getElementById(iconId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

// Validate passwords
function validatePassword() {
    let pass = document.getElementById("password").value;
    let confirmPass = document.getElementById("confirmPassword").value;
    let error = document.getElementById("error");

    if (pass !== confirmPass) {
        error.innerText = "Passwords do not match!";
        return false;
    }

    // If match → go to dashboard
    window.location.href = "dashboard.html";
    return false;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
