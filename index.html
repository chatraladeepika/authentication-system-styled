<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 custom-card" style="width: 350px;">
        <h3 class="text-center">Login</h3>

        <form action="dashboard.html">
            <label>Email</label>
            <input type="email" class="form-control mb-2" required>

            <label>Password</label>
            <input type="password" class="form-control mb-2" required>

            <button class="btn btn-primary w-100 mt-2">Login</button>

            <div class="text-center mt-2">
                <a href="forgot-password.html">Forgot Password?</a><br>
                <a href="register.html">Create Account</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
