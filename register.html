<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 custom-card" style="width: 420px;">
        <h3 class="text-center">Create Account</h3>

        <form action="dashboard.html">
            <input class="form-control mb-2" placeholder="Full Name" required>
            <input type="email" class="form-control mb-2" placeholder="Email" required>
            <input type="tel" class="form-control mb-2" placeholder="Phone Number" required>

            <select class="form-control mb-2" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <input type="date" class="form-control mb-2" required>

            <input type="password" class="form-control mb-2" placeholder="Password" required>
            <input type="password" class="form-control mb-2" placeholder="Confirm Password" required>

            <button class="btn btn-success w-100 mt-2">Register</button>

            <div class="text-center mt-2">
                <a href="index.html">Back to Login</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
